<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>exemplo: hello word</title>
    <style>
       body {
         /* Ativar o flexbox para o alinhamento */
        display: flex;

       /* Centraliza horizontalmente o conteudo */
       justify-content: center;

       /* Centraliza verticalmente o conteudo */
       align-items: center;

       /* Define altura como 100% da altura da tela */
       height: 100vh;

       /* cor de fundo cinza claro  */
       background-color: #fdf3f9;

       /* Define a fonte do texo */
       font-family:arial, sans-serif;
    }

           /* Estilos aplicados ao titulo (h1) */
           h1 { 
            /* cor do texto */
            color:rgb(153, 0, 255);

            /* tamanho da fonte (3 vezes o tamanho padrão) */
            font-size: 32px;

            /* Barra azul ao redor do texto */
            border: 6px double #2C7BE5;

            /* espaçamento inteiro (topo/baixo = 20px, Lados = 40px) */
            padding: 20px 40px;

            /* Arredondamento das bordas  */
            border-radius: 40px;

            /* fundo branco para destacar o texto */
            background-color: #FFF;
        }
    </style>
</head>
<body>
    <!-- Texto exibido no navegador -->
    <h1>Hello World</h1>
</body>
</html>
